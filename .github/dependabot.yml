# Dependabot mantiene las dependencias al día y vigila vulnerabilidades.
# Abre pull requests con las actualizaciones; nada se aplica sin revisión.
version: 2
updates:
  # Librerías del proyecto (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Agrupa actualizaciones menores/parche en un solo PR para reducir ruido.
      dependencias-menores:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # No proponer saltos MAYORES de Next.js: next-intl 3 aun no soporta
      # Next 16, asi que esas actualizaciones rompen la instalacion. La
      # migracion a Next 15/16 se hara manualmente y junto con next-intl.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-intl"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]

  # Actualizaciones de GitHub Actions (si más adelante usamos workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
